name: Stocks Data Process

on:
  workflow_run:
    workflows:
      - Stocks history
      - Stocks OHLCV update daily
      - Stocks EPS update weekly
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          lfs: true

      - name: Sync to latest on branch
        if: github.event_name == 'workflow_run'
        run: git fetch origin "${{ github.event.workflow_run.head_branch }}" && git reset --hard "origin/${{ github.event.workflow_run.head_branch }}"

      - name: Download latest combined release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("combined-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'combined' \
            --output /usr/local/bin/combined
          chmod +x /usr/local/bin/combined
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest avgpe release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("avgpe-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'avgpe' \
            --output /usr/local/bin/avgpe
          chmod +x /usr/local/bin/avgpe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild combined for all tickers
        run: combined 2>&1

      - name: Rebuild avgpe for all tickers
        run: |
          set -euo pipefail
          for years in 5 10; do
            echo "=== avgpe ${years} ==="
            if ! avgpe "$years" 2>&1; then
              echo "::warning::avgpe ${years} failed"
            fi
          done
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/stocks
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: stocks process data"
            git pull --rebase origin main
            git push
          fi
