name: pubmarks/macrotrends build and release

on:
  push:
    branches: [main]
    paths:
      - "scripts/go/macrotrends/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25.7

      - name: Get previous tag
        id: previoustag
        run: |
          tag=$(gh api "repos/${{ github.repository }}/tags" --jq \
            '[.[] | select(.name | startswith("macrotrends-"))] | .[0].name // "macrotrends-0.0.0"' \
            2>/dev/null || echo "macrotrends-0.0.0")
          version="${tag#macrotrends-}"
          echo "tag=$version" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next minor version
        id: semvers
        uses: WyriHaximus/github-action-next-semvers@v1
        with:
          version: ${{ steps.previoustag.outputs.tag }}

      - name: Build
        working-directory: scripts/go/macrotrends
        run: |
          CGO_ENABLED=0 go build -o macrotrends .
          mkdir -p ../../../out
          mv macrotrends ../../../out/macrotrends

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v2.0.8
        with:
          draft: false
          fail_on_unmatched_files: true
          files: out/macrotrends
          generate_release_notes: true
          prerelease: false
          tag_name: "macrotrends-${{ steps.semvers.outputs.patch }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
