name: Update README table

on:
  workflow_run:
    workflows:
      - Stocks Data Process
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
          fetch-depth: 0

      - name: Sync to latest on branch
        if: github.event_name == 'workflow_run'
        run: git fetch origin "${{ github.event.workflow_run.head_branch }}" && git reset --hard "origin/${{ github.event.workflow_run.head_branch }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Update README stocks table
        run: uv run scripts/python/readme/stocks_table.py

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (
            git commit -m "chore: update readme table" &&
            branch="$(git branch --show-current)" &&
            git pull --rebase origin "$branch" &&
            git push
          )
