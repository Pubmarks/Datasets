name: Stocks OHLCV update daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync yf
        run: uv sync --project scripts/python/yf --frozen --no-dev

      - name: Refresh OHLCV for all tickers
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          commit_if_staged() {
            if ! git diff --staged --quiet; then
              git commit -m "$1"
              git pull --rebase origin main
              git push
            fi
          }

          ROOT="data/stocks"
          if [ ! -d "$ROOT" ]; then
            echo "No $ROOT; nothing to update."
            exit 0
          fi
          mapfile -t dirs < <(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No ticker directories under $ROOT; nothing to update."
            exit 0
          fi

          first=true
          for dir in "${dirs[@]}"; do
            ticker=$(basename "$dir" | tr '[:lower:]' '[:upper:]')
            if git log --since="6 hours ago" --oneline -- "${dir}/ohlcv.csv" ":(glob)${dir}/*/ohlcv.csv" | grep -q .; then
              echo "Skipping $ticker — committed within last 6 hours"
              continue
            fi
            [ "$first" = true ] || sleep 10
            first=false
            echo "--- $ticker ---"
            uv run --project scripts/python/yf --frozen --no-dev -- yf ohlcv "$ticker"
            git add "$ROOT"
            commit_if_staged "chore: ${ticker,,} ohlcv daily update"
          done
