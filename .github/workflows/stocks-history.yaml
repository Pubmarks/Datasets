name: Stocks history

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Comma-separated tickers (e.g. MSFT,AAPL)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync yf
        run: uv sync --project scripts/python/yf --frozen --no-dev

      - name: Download macrotrends
        run: |
          tag=$(gh api "repos/${{ github.repository }}/releases" --jq \
            '[.[] | select(.tag_name | startswith("macrotrends-"))] | .[0].tag_name' \
            2>/dev/null || echo "")
          [ -n "$tag" ] || { echo "::error::no macrotrends release found"; exit 1; }
          gh release download "$tag" --repo "${{ github.repository }}" \
            --pattern "macrotrends" --dir /usr/local/bin
          chmod +x /usr/local/bin/macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch history
        env:
          TICKER_INPUT: ${{ github.event.inputs.ticker }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          commit_if_staged() {
            if ! git diff --staged --quiet; then
              git commit -m "$1"
              git pull --rebase origin main
              git push
            fi
          }

          TRIMMED="${TICKER_INPUT// /}"
          [ -n "$TRIMMED" ] || { echo "::error::ticker input is required"; exit 1; }
          IFS=',' read -ra TICKERS <<< "$TRIMMED"

          first=true
          for TICKER in "${TICKERS[@]}"; do
            T=$(echo "${TICKER// /}" | tr '[:lower:]' '[:upper:]')
            [ -n "$T" ] || continue
            [ "$first" = true ] || sleep 10
            first=false
            echo "--- $T ---"
            uv run --project scripts/python/yf --frozen --no-dev -- yf ohlcv "$T"
            macrotrends peratio --write "$T"
            git add data/stocks
            commit_if_staged "chore: ${T,,} history"
          done
